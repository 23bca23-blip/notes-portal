<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <!-- 🔥 NAVBAR -->
    <div class="navbar">
        <h2>📚 Notes Portal</h2>
        <div>
            <a href="/">Home</a>
            <a href="/upload_page">Upload</a>
            <a href="/notes">Notes</a>
            <a href="/admin">Admin</a>
            <a href="/logout">Logout</a>
            <span class="user-info">👤 {{ username }} ({{ role }})</span>
        </div>
    </div>

    <div class="container">

        <h2>📊 Admin Dashboard</h2>

        <div class="note-card">
            <h3>Total Users</h3>
            <p>{{ users }}</p>
        </div>

        <div class="note-card">
            <h3>Total Notes</h3>
            <p>{{ notes }}</p>
        </div>

    </div>

</body>
</html>
