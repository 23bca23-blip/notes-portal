<!DOCTYPE html>
<html>
<head>
    <title>Student Notes System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <!-- 🔥 NAVBAR -->
    <div class="navbar">
        <h2>📚 Notes Portal</h2>
        <div>
            <a href="/">Home</a>
            <a href="/upload_page">Upload</a>
            <a href="/notes">Notes</a>
            {% if role == "admin" %}
            <a href="/admin">Admin</a>
            {% endif %}
            <a href="/logout">Logout</a>
            <span class="user-info">👤 {{ username }} ({{ role }})</span>
        </div>
    </div>

    <!-- 🔥 MAIN CONTAINER -->
    <div class="container">

        <h2>Welcome, {{ username }} 👋</h2>

        <p>Your centralized platform to upload, manage, and access academic notes.</p>

        <hr>

        <h3>📌 Quick Actions</h3>

        <div class="menu">
            <a href="/upload_page">📤 Upload Notes</a>
            <a href="/notes">📄 Browse Notes</a>
        </div>

        <hr>

    </div>

</body>
</html>
